<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>G8 Entrenador — Próximamente</title>
<meta name="description" content="Estamos construyendo algo grande. G8 Entrenador, forjando los cracks del mañana.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #000; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #F1F0EC;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  position: relative;
}
.glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,128,0,0.15) 0%, transparent 70%);
  pointer-events: none;
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
}
.content { position: relative; z-index: 2; max-width: 500px; }
.logo {
  width: 140px;
  margin: 0 auto 32px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}
h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
h1 .g8 { color: #ff8000; }
.subtitle {
  font-size: 15px;
  color: rgba(241,240,236,0.6);
  margin-bottom: 40px;
  font-weight: 400;
}
.terminal {
  background: rgba(30,30,112,0.3);
  border: 1px solid #2d2d8a;
  border-radius: 12px;
  padding: 20px;
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 13px;
  text-align: left;
  color: #F1F0EC;
  min-height: 90px;
  margin-bottom: 32px;
}
.terminal .prompt { color: #ff8000; }
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #ff8000;
  margin-left: 2px;
  animation: blink 1s infinite;
  vertical-align: middle;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
.footer {
  font-size: 12px;
  color: rgba(241,240,236,0.4);
}
.footer a {
  color: #ff8000;
  text-decoration: none;
  font-weight: 600;
}
@media (max-width: 480px) {
  .logo { width: 110px; margin-bottom: 24px; }
  h1 { font-size: 22px; }
  .subtitle { font-size: 14px; margin-bottom: 28px; }
  .terminal { font-size: 12px; padding: 16px; }
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="content">
  <img src="logo.png" alt="G8 Entrenador" class="logo">
  <h1><span class="g8">G8</span> Entrenador</h1>
  <p class="subtitle">Forjando los cracks del mañana</p>
  <div class="terminal">
    <span class="prompt">$</span> <span id="typed"></span><span class="cursor"></span>
  </div>
  <p class="footer">Coming soon · <a href="https://wa.me/584120168219">Contacto</a></p>
</div>
<script>
const messages = [
  'Inicializando academia...',
  'Cargando metodología...',
  'Preparando el futuro del fútbol...',
  'Construyendo algo grande...'
];
let msgIndex = 0, charIndex = 0, deleting = false;
const el = document.getElementById('typed');
function type() {
  const current = messages[msgIndex];
  if (!deleting) {
    el.textContent = current.slice(0, charIndex++);
    if (charIndex > current.length) {
      deleting = true;
      setTimeout(type, 2000);
      return;
    }
  } else {
    el.textContent = current.slice(0, charIndex--);
    if (charIndex < 0) {
      deleting = false;
      msgIndex = (msgIndex + 1) % messages.length;
    }
  }
  setTimeout(type, deleting ? 30 : 60);
}
type();
</script>
</body>
</html>
